<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>oneme Widget</title>
    <link rel="stylesheet" href="./widget.css">
  </head>
  <body>
    <main class="widget-shell">
      <section id="widget-card" class="widget-card">
        <header>
          <h1>oneme</h1>
          <p id="app-name">Widget</p>
        </header>

        <canvas id="widget-preview" width="360" height="420" aria-label="Avatar preview"></canvas>

        <form id="widget-form">
          <label>
            Hair
            <select name="hair" id="widget-hair"></select>
          </label>
          <label>
            Top
            <select name="top" id="widget-top"></select>
          </label>
          <label>
            Accessory
            <select name="accessory" id="widget-accessory"></select>
          </label>
          <label>
            Skin
            <input name="skin" id="widget-skin" type="color" value="#c98f6f">
          </label>
        </form>

        <button id="widget-save" type="button">Save Avatar</button>
        <p id="widget-status" role="status"></p>
      </section>
    </main>

    <script defer src="./src/widget-apps.js"></script>
    <script defer src="./src/widget.js"></script>
  </body>
</html>
