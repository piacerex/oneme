<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>oneme Web SDK Example</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(320px, 480px) 1fr;
        gap: 20px;
        padding: 20px;
        background: #f4f0ea;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #viewer,
      pre {
        min-height: min(680px, calc(100vh - 40px));
        border: 1px solid #d8d0c6;
        border-radius: 8px;
        background: #fff;
      }

      pre {
        margin: 0;
        padding: 14px;
        overflow: auto;
      }

      @media (max-width: 800px) {
        body {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <pre id="output"></pre>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
      import { OnemeClient, mountThreeAvatar } from "../../packages/sdk-web/src/oneme-web-sdk.js";

      const params = new URLSearchParams(window.location.search);
      const apiBaseUrl = params.get("api");
      const client = new OnemeClient(apiBaseUrl ? { apiBaseUrl } : {});
      const output = document.querySelector("#output");
      const fallbackAvatar =
        client.getLatestAvatar() ??
        {
          avatarId: "sdk-demo",
          parts: {
            top: "top.basic_01",
            bottom: "bottom.basic_01"
          },
          colors: {
            skin: "#c98f6f",
            hair: "#2f2118"
          },
          faceMorph: {
            widthScale: 1,
            heightScale: 1,
            depth: 0.5
          }
        };
      const avatar = apiBaseUrl ? await client.fetchAvatar("demo-avatar") : fallbackAvatar;
      const model = apiBaseUrl ? await client.fetchModel(avatar.avatarId, { format: "vrm" }) : client.getModel(avatar.avatarId);

      mountThreeAvatar(document.querySelector("#viewer"), avatar, { THREE });
      output.textContent = JSON.stringify(
        {
          avatar,
          model
        },
        null,
        2
      );
    </script>
  </body>
</html>
