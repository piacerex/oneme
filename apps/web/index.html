<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>oneme Avatar Builder</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Avatar builder">
        <div class="preview-panel">
          <canvas
            id="avatar-preview"
            class="avatar-preview"
            width="720"
            height="960"
            aria-label="Avatar preview"
          ></canvas>
        </div>

        <aside class="editor-panel" aria-label="Avatar editor">
          <header class="editor-header">
            <h1>oneme</h1>
            <p>Avatar Builder MVP</p>
          </header>

          <form id="avatar-form" class="controls">
            <fieldset class="face-analysis">
              <legend>Face Photo</legend>
              <label class="consent-row">
                <input id="face-consent" type="checkbox">
                Use this photo only for local recommendations
              </label>
              <label>
                Photo
                <input id="face-photo" type="file" accept="image/*">
              </label>
              <div class="face-actions">
                <button id="analyze-face" type="button">Analyze</button>
                <button id="clear-face" type="button">Clear Photo</button>
              </div>
              <p id="face-status" class="face-status" role="status">
                Manual creation works without a photo.
              </p>
              <div id="face-result" class="face-result" hidden></div>
            </fieldset>

            <fieldset>
              <legend>Parts</legend>
              <label>
                Face
                <select name="face" id="face-select"></select>
              </label>
              <label>
                Hair
                <select name="hair" id="hair-select"></select>
              </label>
              <label>
                Top
                <select name="top" id="top-select"></select>
              </label>
              <label>
                Bottom
                <select name="bottom" id="bottom-select"></select>
              </label>
              <label>
                Shoes
                <select name="shoes" id="shoes-select"></select>
              </label>
              <label>
                Accessory
                <select name="accessory" id="accessory-select"></select>
              </label>
            </fieldset>

            <fieldset>
              <legend>Colors</legend>
              <label>
                Skin
                <input name="skin" id="skin-color" type="color" value="#c98f6f">
              </label>
              <label>
                Hair
                <input name="hairColor" id="hair-color" type="color" value="#2f2118">
              </label>
            </fieldset>
          </form>

          <section class="ai-panel" aria-label="AI generation">
            <div class="panel-heading">
              <h2>AI Generation MVP</h2>
              <button id="generate-ai" type="button">Generate Ideas</button>
            </div>
            <p id="ai-status" class="ai-status" role="status">
              Generates safe style candidates from current avatar settings.
            </p>
            <div id="ai-candidates" class="ai-candidates"></div>
          </section>

          <section class="actions" aria-label="Avatar actions">
            <button id="save-avatar" type="button">Save</button>
            <button id="load-avatar" type="button">Load Latest</button>
            <button id="export-glb" type="button">Export GLB</button>
            <button id="get-model-url" type="button">Get Model URL</button>
            <a id="download-glb" class="download-link" download="oneme-avatar.glb" hidden>Download GLB</a>
            <span id="save-status" role="status"></span>
          </section>

          <section class="export-panel" aria-label="Export job">
            <h2>Export Job</h2>
            <pre id="export-output"></pre>
          </section>

          <section class="config-panel" aria-label="Avatar config">
            <h2>Config JSON</h2>
            <pre id="config-output"></pre>
          </section>
        </aside>
      </section>
    </main>

    <script defer src="./src/app.js"></script>
  </body>
</html>
